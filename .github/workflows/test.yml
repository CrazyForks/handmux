name: test

on:
  push:
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm install
        working-directory: server
      - run: npm test
        working-directory: server

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: web
      - run: npx vitest run
        working-directory: web
